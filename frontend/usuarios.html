<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuários | Fluxo de Caixa</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="app-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar__header">
      <span class="sidebar__logo">💰</span>
      <span class="sidebar__titulo">Fluxo de Caixa</span>
      <button class="sidebar__fechar" id="btn-fechar-sidebar" aria-label="Fechar menu">✕</button>
    </div>
    <nav class="sidebar__nav">
      <a href="index.html"    class="nav-item" data-pagina="dashboard"><span class="nav-item__icone">📊</span> Dashboard</a>
      <a href="caixa.html"    class="nav-item" data-pagina="caixa"><span class="nav-item__icone">💵</span> Fluxo de Caixa</a>
      <a href="produtos.html" class="nav-item" data-pagina="produtos"><span class="nav-item__icone">📦</span> Produtos</a>
      <a href="usuarios.html" class="nav-item nav-item--ativo nav-item--admin" data-pagina="usuarios"><span class="nav-item__icone">👥</span> Usuários</a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__usuario">
        <span class="sidebar__usuario-avatar">👤</span>
        <div>
          <p class="sidebar__usuario-nome" id="nome-usuario">—</p>
          <p class="sidebar__usuario-tipo" id="tipo-usuario">—</p>
        </div>
      </div>
      <button class="btn btn--outline btn--sm btn--bloco" id="btn-logout">🚪 Sair</button>
    </div>
  </aside>

  <div class="app-main">
    <header class="topbar">
      <button class="topbar__menu" id="btn-abrir-sidebar" aria-label="Abrir menu">☰</button>
      <h1 class="topbar__titulo">👥 Usuários</h1>
      <span class="topbar__badge" id="badge-usuario"></span>
    </header>

    <main class="conteudo-pagina">

      <!-- Formulário -->
      <section class="secao-card" id="secao-form" style="display:none">
        <h2 class="secao-card__titulo" id="titulo-form">➕ Novo Usuário</h2>

        <form id="form-usuario" class="formulario formulario--grid" novalidate>
          <input type="hidden" id="usuario-id" />

          <div class="campo">
            <label class="campo__label" for="nome">Nome Completo *</label>
            <input class="campo__input" type="text" id="nome" name="nome"
                   placeholder="Nome do usuário" required />
          </div>

          <div class="campo">
            <label class="campo__label" for="email">E-mail *</label>
            <input class="campo__input" type="email" id="email" name="email"
                   placeholder="usuario@email.com" required />
          </div>

          <div class="campo" id="campo-senha">
            <label class="campo__label" for="senha">Senha *</label>
            <input class="campo__input" type="password" id="senha" name="senha"
                   placeholder="Mínimo 6 caracteres" />
          </div>

          <div class="campo">
            <label class="campo__label" for="telefone">Telefone</label>
            <input class="campo__input" type="tel" id="telefone" name="telefone"
                   placeholder="(11) 99999-9999" />
          </div>

          <div class="campo">
            <label class="campo__label" for="tipo_usuario">Tipo de Usuário *</label>
            <select class="campo__input" id="tipo_usuario" name="tipo_usuario">
              <option value="USUARIO_NORMAL">👤 Usuário Normal</option>
              <option value="ADMIN">🔑 Administrador</option>
            </select>
          </div>

          <div id="msg-form-usr" class="mensagem campo--full" role="alert" aria-live="polite"></div>

          <div class="campo--full campo__acoes">
            <button type="submit" class="btn btn--primario" id="btn-salvar-usr">💾 Salvar</button>
            <button type="button" class="btn btn--outline"  id="btn-cancelar-usr">✕ Cancelar</button>
          </div>
        </form>
      </section>

      <!-- Listagem -->
      <section class="secao-card">
        <div class="secao-card__header">
          <h2 class="secao-card__titulo">📋 Lista de Usuários</h2>
          <button class="btn btn--primario btn--sm" id="btn-novo-usuario">➕ Novo Usuário</button>
        </div>

        <div class="tabela-wrapper">
          <table class="tabela">
            <thead>
              <tr>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Telefone</th>
                <th>Tipo</th>
                <th>Status</th>
                <th>Cadastro</th>
                <th class="col-acoes">Ações</th>
              </tr>
            </thead>
            <tbody id="tbody-usuarios">
              <tr><td colspan="7" class="tabela__vazio">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal">
      <h3 class="modal__titulo" id="modal-titulo">Confirmar</h3>
      <p class="modal__texto"  id="modal-texto">Tem certeza?</p>
      <div class="modal__acoes">
        <button class="btn btn--perigo"  id="modal-confirmar">Confirmar</button>
        <button class="btn btn--outline" id="modal-cancelar">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/usuarios.js"></script>
</body>
</html>
