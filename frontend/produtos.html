<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produtos | Fluxo de Caixa</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="app-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar__header">
      <span class="sidebar__logo">💰</span>
      <span class="sidebar__titulo">Fluxo de Caixa</span>
      <button class="sidebar__fechar" id="btn-fechar-sidebar" aria-label="Fechar menu">✕</button>
    </div>
    <nav class="sidebar__nav">
      <a href="index.html"    class="nav-item" data-pagina="dashboard"><span class="nav-item__icone">📊</span> Dashboard</a>
      <a href="caixa.html"    class="nav-item" data-pagina="caixa"><span class="nav-item__icone">💵</span> Fluxo de Caixa</a>
      <a href="produtos.html" class="nav-item nav-item--ativo" data-pagina="produtos"><span class="nav-item__icone">📦</span> Produtos</a>
      <a href="usuarios.html" class="nav-item nav-item--admin" data-pagina="usuarios"><span class="nav-item__icone">👥</span> Usuários</a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__usuario">
        <span class="sidebar__usuario-avatar">👤</span>
        <div>
          <p class="sidebar__usuario-nome" id="nome-usuario">—</p>
          <p class="sidebar__usuario-tipo" id="tipo-usuario">—</p>
        </div>
      </div>
      <button class="btn btn--outline btn--sm btn--bloco" id="btn-logout">🚪 Sair</button>
    </div>
  </aside>

  <div class="app-main">
    <header class="topbar">
      <button class="topbar__menu" id="btn-abrir-sidebar" aria-label="Abrir menu">☰</button>
      <h1 class="topbar__titulo">📦 Produtos</h1>
      <span class="topbar__badge" id="badge-usuario"></span>
    </header>

    <main class="conteudo-pagina">

      <!-- Formulário (oculto por padrão) -->
      <section class="secao-card" id="secao-form" style="display:none">
        <h2 class="secao-card__titulo" id="titulo-form">➕ Novo Produto</h2>

        <form id="form-produto" class="formulario formulario--grid" novalidate>
          <input type="hidden" id="produto-id" />

          <div class="campo">
            <label class="campo__label" for="nome_produto">Nome do Produto *</label>
            <input class="campo__input" type="text" id="nome_produto" name="nome_produto"
                   placeholder="Ex: Caneta Azul BIC" required />
          </div>

          <div class="campo">
            <label class="campo__label" for="codigo_barras">Código de Barras</label>
            <input class="campo__input" type="text" id="codigo_barras" name="codigo_barras"
                   placeholder="Ex: 7891234560001" />
          </div>

          <div class="campo">
            <label class="campo__label" for="categoria_prod">Categoria</label>
            <input class="campo__input" type="text" id="categoria_prod" name="categoria"
                   placeholder="Ex: papelaria, alimentacao..." list="lista-categorias" />
            <datalist id="lista-categorias"></datalist>
          </div>

          <div class="campo">
            <label class="campo__label" for="fornecedor">Fornecedor</label>
            <input class="campo__input" type="text" id="fornecedor" name="fornecedor"
                   placeholder="Nome do fornecedor" />
          </div>

          <div class="campo">
            <label class="campo__label" for="preco_custo">Preço de Custo (R$)</label>
            <input class="campo__input" type="number" id="preco_custo" name="preco_custo"
                   placeholder="0,00" min="0" step="0.01" />
          </div>

          <div class="campo">
            <label class="campo__label" for="preco_venda">Preço de Venda (R$)</label>
            <input class="campo__input" type="number" id="preco_venda" name="preco_venda"
                   placeholder="0,00" min="0" step="0.01" />
          </div>

          <div class="campo">
            <label class="campo__label" for="quantidade_estoque">Qtd. em Estoque</label>
            <input class="campo__input" type="number" id="quantidade_estoque" name="quantidade_estoque"
                   placeholder="0" min="0" step="1" />
          </div>

          <div class="campo">
            <label class="campo__label" for="estoque_minimo">Estoque Mínimo</label>
            <input class="campo__input" type="number" id="estoque_minimo" name="estoque_minimo"
                   placeholder="5" min="0" step="1" />
          </div>

          <div class="campo campo--full">
            <label class="campo__label" for="descricao_prod">Descrição</label>
            <textarea class="campo__input campo__textarea" id="descricao_prod" name="descricao"
                      placeholder="Descrição detalhada do produto..." rows="2"></textarea>
          </div>

          <div id="msg-form-prod" class="mensagem campo--full" role="alert" aria-live="polite"></div>

          <div class="campo--full campo__acoes">
            <button type="submit" class="btn btn--primario" id="btn-salvar-prod">💾 Salvar</button>
            <button type="button" class="btn btn--outline"  id="btn-cancelar-prod">✕ Cancelar</button>
          </div>
        </form>
      </section>

      <!-- Listagem -->
      <section class="secao-card">
        <div class="secao-card__header">
          <h2 class="secao-card__titulo">📋 Lista de Produtos</h2>
          <div class="filtros">
            <input class="campo__input campo__input--sm" type="text" id="busca-produto"
                   placeholder="🔍 Buscar por nome ou código..." />
            <select class="campo__input campo__input--sm" id="filtro-categoria">
              <option value="">Todas as categorias</option>
            </select>
            <button class="btn btn--primario btn--sm" id="btn-novo-produto">➕ Novo Produto</button>
          </div>
        </div>

        <div class="tabela-wrapper">
          <table class="tabela" id="tabela-produtos">
            <thead>
              <tr>
                <th>Produto</th>
                <th>Código</th>
                <th>Categoria</th>
                <th>Custo</th>
                <th>Venda</th>
                <th>Estoque</th>
                <th>Fornecedor</th>
                <th class="col-acoes">Ações</th>
              </tr>
            </thead>
            <tbody id="tbody-produtos">
              <tr><td colspan="8" class="tabela__vazio">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Modal de confirmação -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal">
      <h3 class="modal__titulo" id="modal-titulo">Confirmar</h3>
      <p class="modal__texto"  id="modal-texto">Tem certeza?</p>
      <div class="modal__acoes">
        <button class="btn btn--perigo"  id="modal-confirmar">Confirmar</button>
        <button class="btn btn--outline" id="modal-cancelar">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/produtos.js"></script>
</body>
</html>
